<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Feedback reflection workflow</title>
  <desc id="desc">A five-step workflow from user feedback to project or global rule decisions.</desc>
  <rect width="1200" height="520" rx="24" fill="#F6F8FA"/>
  <text x="60" y="70" fill="#24292F" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">How it works</text>
  <text x="60" y="104" fill="#57606A" font-family="Inter, Arial, sans-serif" font-size="17">The package installs hooks. The agent still owns the reasoning.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0969DA"/>
    </marker>
  </defs>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(62 160)">
      <rect width="180" height="145" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="22" y="42" fill="#CF222E" font-size="17" font-weight="700">1. Trigger</text>
      <text x="22" y="78" fill="#24292F" font-size="14">Strong dissatisfaction</text>
      <text x="22" y="102" fill="#24292F" font-size="14">Repeated error</text>
      <text x="22" y="126" fill="#24292F" font-size="14">Process violation</text>
    </g>
    <line x1="260" y1="232" x2="350" y2="232" stroke="#0969DA" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(370 160)">
      <rect width="180" height="145" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="22" y="42" fill="#0969DA" font-size="17" font-weight="700">2. Hook</text>
      <text x="22" y="78" fill="#24292F" font-size="14">Shell only</text>
      <text x="22" y="102" fill="#24292F" font-size="14">Fail-open</text>
      <text x="22" y="126" fill="#24292F" font-size="14">Inject prompt</text>
    </g>
    <line x1="568" y1="232" x2="658" y2="232" stroke="#0969DA" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(678 160)">
      <rect width="180" height="145" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="22" y="42" fill="#1A7F37" font-size="17" font-weight="700">3. Reflect</text>
      <text x="22" y="78" fill="#24292F" font-size="14">Agent fault?</text>
      <text x="22" y="102" fill="#24292F" font-size="14">User misunderstanding?</text>
      <text x="22" y="126" fill="#24292F" font-size="14">External limit?</text>
    </g>
    <line x1="876" y1="232" x2="966" y2="232" stroke="#0969DA" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(986 160)">
      <rect width="155" height="145" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="22" y="42" fill="#8250DF" font-size="17" font-weight="700">4. Clean up</text>
      <text x="22" y="78" fill="#24292F" font-size="14">Release subagents</text>
      <text x="22" y="102" fill="#24292F" font-size="14">Record ids</text>
      <text x="22" y="126" fill="#24292F" font-size="14">Summarize</text>
    </g>

    <g transform="translate(248 365)">
      <rect width="704" height="86" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="28" y="35" fill="#24292F" font-size="18" font-weight="700">5. Rule decision</text>
      <text x="28" y="64" fill="#57606A" font-size="15">Project rules go to .agent/rules/feedback-loop.md. Global rules require Blocker + agent_fault + cross-project evidence.</text>
    </g>
  </g>
</svg>
