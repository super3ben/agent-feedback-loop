<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Feedback Loop overview</title>
  <desc id="desc">Prompt-first hooks detect strong feedback and inject a reflection prompt before the agent continues.</desc>
  <rect width="1200" height="420" rx="28" fill="#0D1117"/>
  <rect x="34" y="34" width="1132" height="352" rx="22" fill="#111827" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#F0F6FC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">Agent Feedback Loop</text>
  <text x="72" y="136" fill="#8B949E" font-family="Inter, Arial, sans-serif" font-size="18">Prompt-first reflection hooks for Codex and Claude Code</text>

  <g transform="translate(72 185)">
    <rect width="270" height="112" rx="16" fill="#161B22" stroke="#F85149" stroke-width="2"/>
    <text x="24" y="40" fill="#F85149" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">User feedback</text>
    <text x="24" y="74" fill="#C9D1D9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">"You keep missing context"</text>
  </g>

  <path d="M370 241H500" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M488 227L506 241L488 255" stroke="#58A6FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(526 174)">
    <rect width="220" height="134" rx="16" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
    <text x="24" y="42" fill="#58A6FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Thin hook</text>
    <text x="24" y="75" fill="#C9D1D9" font-family="Inter, Arial, sans-serif" font-size="15">No daemon</text>
    <text x="24" y="100" fill="#C9D1D9" font-family="Inter, Arial, sans-serif" font-size="15">No LLM call in JS</text>
  </g>

  <path d="M770 241H900" stroke="#3FB950" stroke-width="4" stroke-linecap="round"/>
  <path d="M888 227L906 241L888 255" stroke="#3FB950" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(930 185)">
    <rect width="200" height="112" rx="16" fill="#161B22" stroke="#3FB950" stroke-width="2"/>
    <text x="24" y="40" fill="#3FB950" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Reflection prompt</text>
    <text x="24" y="74" fill="#C9D1D9" font-family="Inter, Arial, sans-serif" font-size="15">Classify responsibility</text>
  </g>

  <g transform="translate(72 326)">
    <rect width="1056" height="30" rx="15" fill="#0D1117" stroke="#30363D"/>
    <circle cx="18" cy="15" r="5" fill="#3FB950"/>
    <text x="36" y="20" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">npm install -g agent-feedback-loop &amp;&amp; agent-feedback-loop install</text>
  </g>
</svg>
